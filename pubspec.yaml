name: bajaru_admin_frontend
description: "Bajaru Admin Panel — internal operations dashboard."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  dio: ^5.8.0
  shared_preferences: ^2.3.5
  # Auth — Truecaller one-tap + WhatsApp OTP
  truecaller_sdk: ^1.2.0
  uuid: ^4.0.0
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/

# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/bajaru_admin_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#DEF829"
  adaptive_icon_foreground: "assets/icons/bajaru_admin_icon.png"
  adaptive_icon_foreground_inset: 28
